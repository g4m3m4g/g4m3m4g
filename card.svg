<svg xmlns="http://www.w3.org/2000/svg" width="560" height="370" viewBox="0 0 560 370">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .sans { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
    <radialGradient id="glow" cx="85%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#c8f542" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c8f542" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="560" height="370" rx="16"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="560" height="370" rx="16" fill="#111111"/>
  <rect width="560" height="370" rx="16" fill="url(#glow)"/>
  <rect width="560" height="370" rx="16" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Tag -->
  <rect x="52" y="44" width="58" height="20" rx="4" fill="rgba(200,245,66,0.08)" stroke="rgba(200,245,66,0.18)" stroke-width="1"/>
  <text x="81" y="58" text-anchor="middle" class="mono" font-size="9" fill="#c8f542" letter-spacing="1.5">PROFILE</text>

  <!-- Name -->
  <text x="52" y="124" class="sans" font-size="54" font-weight="700" fill="#f0f0f0" letter-spacing="-1.5">GAMIE</text>

  <!-- Tagline -->
  <text x="52" y="148" class="sans" font-size="12.5" font-weight="300" fill="#4a4a4a">a programmer. interested in how things break.</text>

  <!-- Divider -->
  <line x1="52" y1="168" x2="508" y2="168" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Stack label -->
  <text x="52" y="192" class="mono" font-size="8.5" fill="#444444" letter-spacing="2">STACK</text>

  <!-- typescript pill -->
  <rect x="52" y="200" width="98" height="26" rx="6" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <text x="101" y="217" text-anchor="middle" class="mono" font-size="11" fill="#888888">typescript</text>

  <!-- java pill -->
  <rect x="158" y="200" width="50" height="26" rx="6" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <text x="183" y="217" text-anchor="middle" class="mono" font-size="11" fill="#888888">java</text>

  <!-- bash pill -->
  <rect x="216" y="200" width="50" height="26" rx="6" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <text x="241" y="217" text-anchor="middle" class="mono" font-size="11" fill="#888888">bash</text>

  <!-- linux pill -->
  <rect x="274" y="200" width="52" height="26" rx="6" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <text x="300" y="217" text-anchor="middle" class="mono" font-size="11" fill="#888888">linux</text>

  <!-- Focus label -->
  <text x="52" y="252" class="mono" font-size="8.5" fill="#444444" letter-spacing="2">FOCUS</text>

  <!-- Focus block -->
  <rect x="52" y="260" width="456" height="58" rx="8" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="52" y="260" width="2.5" height="58" rx="1" fill="#c8f542"/>

  <text x="70" y="283" class="sans" font-size="13" font-weight="500" fill="#cccccc">focused on offensive security.</text>
  <text x="70" y="302" class="sans" font-size="11.5" font-weight="300" fill="#4a4a4a">finding gaps before someone else does.</text>

  <!-- Pulsing dot -->
  <circle cx="52" cy="344" r="4" fill="#c8f542">
    <animate attributeName="opacity" values="1;0.15;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Email -->
  <text x="66" y="348" class="mono" font-size="11" fill="#4a4a4a">hi@patiphat.com</text>
</svg>
