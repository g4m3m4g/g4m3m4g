<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340">
  <defs>
    <style>.m { font-family: 'Courier New', Courier, monospace; }</style>
  </defs>

  <!-- Background -->
  <rect width="640" height="340" rx="13" fill="#f8f8f6"/>
  <rect width="640" height="340" rx="13" fill="none" stroke="#dedede" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="640" height="40" rx="13" fill="#eeeeec"/>
  <rect y="27" width="640" height="13" fill="#eeeeec"/>
  <line x1="0" y1="40" x2="640" y2="40" stroke="#dedede" stroke-width="1"/>
  <circle cx="22" cy="20" r="5.5" fill="#d8d8d8"/>
  <circle cx="40" cy="20" r="5.5" fill="#d8d8d8"/>
  <circle cx="58" cy="20" r="5.5" fill="#d8d8d8"/>
  <text x="320" y="24" text-anchor="middle" class="m" font-size="11" fill="#b0b0b0">bash — GAMIE</text>

  <!-- =============== TEXT =============== -->

  <text x="28" y="80" class="m" font-size="14">
    <tspan fill="#c4a000">$</tspan><tspan fill="#1c1c1c"> whoami</tspan>
  </text>

  <text x="28" y="104" class="m" font-size="14" fill="#8a8a8a">gamie</text>

  <text x="28" y="144" class="m" font-size="14">
    <tspan fill="#c4a000">$</tspan><tspan fill="#1c1c1c"> cat stack.txt</tspan>
  </text>

  <text x="28" y="168" class="m" font-size="14" fill="#8a8a8a">typescript · java · bash · linux</text>

  <text x="28" y="208" class="m" font-size="14">
    <tspan fill="#c4a000">$</tspan><tspan fill="#1c1c1c"> cat focus.txt</tspan>
  </text>

  <text x="28" y="232" class="m" font-size="14" fill="#8a8a8a">offensive security.</text>
  <text x="28" y="256" class="m" font-size="14" fill="#8a8a8a">ethical hacking.</text>

  <text x="28" y="296" class="m" font-size="14" fill="#c4a000">$</text>

  <!-- Cursor -->
  <rect x="38" y="282" width="9" height="16" fill="#c4a000" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" dur="0.9s" begin="5.6s" repeatCount="indefinite"/>
  </rect>

  <!-- =============== COVERS ===============      -->
  <!-- Fix: animate both x (→ right) and width     -->
  <!-- (→ 0) so text reveals LEFT → RIGHT          -->

  <!-- $ whoami — t=0.5s, dur=0.5s -->
  <rect x="28" y="65" width="76" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="104" dur="0.5s"  begin="0.5s"  fill="freeze"/>
    <animate attributeName="width" from="76"  to="0"   dur="0.5s"  begin="0.5s"  fill="freeze"/>
  </rect>

  <!-- gamie — t=1.3s -->
  <rect x="28" y="89" width="50" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="78"  dur="0.05s" begin="1.3s"  fill="freeze"/>
    <animate attributeName="width" from="50"  to="0"   dur="0.05s" begin="1.3s"  fill="freeze"/>
  </rect>

  <!-- $ cat stack.txt — t=2.1s, dur=0.72s -->
  <rect x="28" y="129" width="136" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="164" dur="0.72s" begin="2.1s"  fill="freeze"/>
    <animate attributeName="width" from="136" to="0"   dur="0.72s" begin="2.1s"  fill="freeze"/>
  </rect>

  <!-- typescript... — t=3.0s -->
  <rect x="28" y="153" width="280" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="308" dur="0.05s" begin="3.0s"  fill="freeze"/>
    <animate attributeName="width" from="280" to="0"   dur="0.05s" begin="3.0s"  fill="freeze"/>
  </rect>

  <!-- $ cat focus.txt — t=3.7s, dur=0.72s -->
  <rect x="28" y="193" width="136" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="164" dur="0.72s" begin="3.7s"  fill="freeze"/>
    <animate attributeName="width" from="136" to="0"   dur="0.72s" begin="3.7s"  fill="freeze"/>
  </rect>

  <!-- offensive security. — t=4.6s -->
  <rect x="28" y="217" width="170" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="198" dur="0.05s" begin="4.6s"  fill="freeze"/>
    <animate attributeName="width" from="170" to="0"   dur="0.05s" begin="4.6s"  fill="freeze"/>
  </rect>

  <!-- finding gaps... — t=4.85s -->
  <rect x="28" y="241" width="332" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="360" dur="0.05s" begin="4.85s" fill="freeze"/>
    <animate attributeName="width" from="332" to="0"   dur="0.05s" begin="4.85s" fill="freeze"/>
  </rect>

  <!-- $ prompt — t=5.6s -->
  <rect x="28" y="281" width="14" height="20" fill="#f8f8f6">
    <animate attributeName="x"     from="28"  to="42"  dur="0.05s" begin="5.6s"  fill="freeze"/>
    <animate attributeName="width" from="14"  to="0"   dur="0.05s" begin="5.6s"  fill="freeze"/>
  </rect>

</svg>
